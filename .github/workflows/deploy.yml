name: Deploy to EC2

on:
  push:
    branches: [ main ]

# OIDC 인증 권한 설정
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AWS OIDC 인증
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # SSH를 통한 배포 및 세션 독립 실행
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 프로젝트 경로로 이동
            cd /home/ubuntu/Security-AIOps-IsolationForest/monitor
            
            # 2. 최신 코드 반영
            git pull origin main
            
            # 3. 기존 프로세스 종료 (이름으로 찾아 죽이기)
            pkill -f monitor.py || true
            sleep 2
            
            # 4. 로그 파일 생성 (gitignore 대응)
            touch monitor.log
            
            # 5. [핵심] 가상환경 파이썬으로 세션 분리 실행
            # setsid: 부모 세션과 완전히 독립된 새 세션 생성
            # & disown: 쉘의 작업 관리 목록에서 즉시 제거 (SIGHUP 방지)
            setsid /home/ubuntu/Security-AIOps-IsolationForest/venv/bin/python3 monitor.py > monitor.log 2>&1 &
            disown
            
            # 6. 실행 확인 및 강제 성공 처리
            sleep 3
            if ps -ef | grep -v grep | grep monitor.py > /dev/null
            then
                echo "🚀 monitor.py가 독립 세션에서 성공적으로 실행되었습니다!"
                ps -ef | grep monitor.py | grep -v grep
                exit 0
            else
                echo "❌ 실행 실패. monitor.log 내용을 확인하세요."
                cat monitor.log
                exit 1
            fi