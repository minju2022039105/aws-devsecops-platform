name: Deploy to EC2

on:
  push:
    branches: [ main ]

# 1. OIDC 인증 토큰 발급 권한
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS OIDC 자격 증명 설정
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # 3. SSH를 통한 배포 및 실행
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # A. 프로젝트 경로로 이동
            cd /home/ubuntu/Security-AIOps-IsolationForest/monitor
            
            # B. 최신 코드 업데이트
            git pull origin main
            
            # C. [.gitignore 대응] 로그 파일이 없으면 생성하고 권한 부여
            touch monitor.log
            chmod 666 monitor.log
            
            # D. 기존 프로세스 종료 (실패해도 계속 진행)
            fuser -k 5000/tcp || true
            pkill -f monitor.py || true
            sleep 2
            
            # E. [핵심] 절대 경로로 백그라운드 실행
            # 시스템 파이썬(/usr/bin/python3)을 직접 사용합니다.
            nohup /usr/bin/python3 monitor.py > monitor.log 2>&1 &
            
            # F. 최종 실행 확인 (3초 대기 후 체크)
            sleep 3
            if ps -ef | grep -v grep | grep monitor.py > /dev/null
            then
                echo "🚀 monitor.py가 정상적으로 실행되었습니다!"
                ps -ef | grep monitor.py | grep -v grep
                exit 0
            else
                echo "❌ 실행에 실패했습니다. monitor.log 내용을 출력합니다:"
                cat monitor.log
                exit 1
            fi