name: Deploy to EC2

on:
  push:
    branches: [ main ]

# 1. [추가] OIDC 인증 토큰을 발급받기 위해 반드시 필요한 권한입니다.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 코드를 가져오는 기본 단계
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. [추가] AWS 자격 증명 설정 (OIDC 방식)
      # GitHub Secrets에 등록한 AWS_ROLE_ARN을 사용합니다.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # 3. [기존 코드 유지 및 보완] SSH를 통한 EC2 배포 실행
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # EC2의 프로젝트 경로로 이동
            cd /home/ubuntu/Security-AIOps-IsolationForest/monitor
            
            # 최신 코드 반영
            git pull origin main
            
            # 가상환경 활성화 (상위 폴더에 있는 venv 사용)
            if [ -d "../venv" ]; then
              source ../venv/bin/activate
            fi
            
            # 의존성 설치
            pip install -r ../requirements.txt || pip install -r requirements.txt
            
            # 기존 프로세스 재시작 (monitor.py)
            pkill -f monitor.py || true
            nohup python3 monitor.py > monitor.log 2>&1 &