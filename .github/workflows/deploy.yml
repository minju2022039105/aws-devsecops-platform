name: Deploy to EC2

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/Security-AIOps-IsolationForest/monitor
            git pull origin main
            
            # 2. 기존 프로세스 종료
            pkill -f monitor.py || true
            sleep 2
            
            # 3. 로그 파일 생성 (gitignore 대응)
            touch monitor.log
            
            # 4. [핵심] 확인된 가상환경 파이썬으로 백그라운드 실행
            # setsid를 사용하여 SSH 세션 종료 후에도 프로세스가 유지되도록 합니다.
            setsid /home/ubuntu/Security-AIOps-IsolationForest/venv/bin/python3 monitor.py > monitor.log 2>&1 &
            
            # 5. 실행 확인 (3초 대기)
            sleep 3
            if ps -ef | grep -v grep | grep monitor.py > /dev/null
            then
                echo "🚀 [성공] monitor.py가 가상환경에서 정상 구동 중입니다!"
                ps -ef | grep monitor.py | grep -v grep
                exit 0
            else
                echo "❌ [실패] 프로세스가 뜨지 않았습니다. monitor.log를 출력합니다:"
                cat monitor.log
                exit 1
            fi